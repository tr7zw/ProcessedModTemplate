stonecutter {
    replacements.string(current.parsed >= "1.21.9") {
        replace("PlayerRenderState", "AvatarRenderState")
    }
    replacements.string(current.parsed >= "1.21.11") {
        replace("ResourceLocation", "Identifier")
        replace("ResourceLocationParameter", "ResourceLocationParameter")
        replace("getResourceLocation", "getResourceLocation") // Do not rename this method from the global logic
    }
    replacements.string(current.parsed >= "26.0") {
        replace("GuiGraphics", "GuiGraphicsExtractor")
        replace("getGuiGraphics", "getGuiGraphics") // Do not rename this method from the global logic
        replace("net.minecraft.client.renderer.state.LevelRenderState", "net.minecraft.client.renderer.state.level.LevelRenderState")
        replace("net.minecraft.client.renderer.state.CameraRenderState", "net.minecraft.client.renderer.state.level.CameraRenderState")
    }
}